<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estaciones del año</title>

    <!--conectamos nuestro archivo de estilos-->
    <link rel="stylesheet" href="style.css">

</head>

<!--iniciamos la pagina mostrando primavera-->
<body class="primavera">

    <!--capa donde apareceran los emojis que caen-->
    <div id="fondo-animado" class="capa-particulas"></div>

    <div class="contenedor-central">

        <div class="ilustracion">
            <img src="primavera.png" id="icono-estacion" class="icono">
        </div>

        <!--titulo de la estacion-->
        <h1 id="titulo-estacion">Primavera</h1>

        <!--mensaje pequeño-->
        <p id="mensaje">El mundo vuelve a florecer</p>

        <!--boton para cambiar de estacion-->
        <button id="boton-estacion">Cambiar estación</button>

    </div>

    <!--archivo de javascript-->
    <script src="acciones.js"></script>

</body>
</html>
